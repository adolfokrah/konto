name: Run Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      DATABASE_URI_TEST: mongodb://localhost:27017/payload-test
      NODE_OPTIONS: '--no-deprecation --max-old-space-size=4096'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Set up Node.js with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-generate Payload types
        run: |
          echo "Generating Payload types to avoid slow schema pulling..."
          pnpm generate:types

      - name: Run Integration Tests
        run: |
          echo "Running integration tests..."
          pnpm test:int
        timeout-minutes: 10

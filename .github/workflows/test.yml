name: Run Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      NODE_OPTIONS: "--no-deprecation --max-old-space-size=4096"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Set up Node.js with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install docker-compose -y
          docker-compose version

      - name: Start Supabase services
        run: pnpx supabase start

      - name: Wait for Supabase to be ready
        run: |
          echo "Waiting for Supabase Postgres on localhost:54322..."
          timeout 120 bash -c 'until pg_isready -h localhost -p 54322 -U postgres; do sleep 2; done'
          echo "Supabase is ready!"

      - name: Set up test environment
        run: |
          echo "DATABASE_URI=postgresql://postgres:postgres@localhost:54322/postgres" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      - name: Pre-generate Payload types
        run: |
          echo "Generating Payload types to avoid slow schema pulling..."
          DATABASE_URI=postgresql://postgres:postgres@localhost:54322/postgres pnpm generate:types

      - name: Run Integration Tests
        run: |
          echo "Running integration tests..."
          pnpm test:int --reporter=basic --no-coverage
        timeout-minutes: 10

      - name: Stop Supabase
        if: always()
        run: |
          cd supabase
          supabase stop
